server {
    listen 15010;
    server_name _;

    # Reject all requests outside a specific subnet
    # Replace 192.168.1.0/24 with your actual desired subnet
    allow 169.229.226.0/24;
    deny all;

    location / {
        proxy_pass http://app:15010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
